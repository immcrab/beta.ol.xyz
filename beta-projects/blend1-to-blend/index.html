<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta property="og:url" content="https://owenlee.xyz" />
    <meta name="theme-color" content="#c5ffea">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="description" content="Free online .blend1 to .blend file converter. No registration, no upload, instant conversion in your browser.">
    <meta name="keywords" content="blend1 to blend converter, blender file converter, fix blend1 file, blender backup file convert, free blend converter online">
    <meta name="robots" content="index, follow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="resources/Images/favicon.png">
    <style>
        body {
            font-family: 'Lilita One', sans-serif;
            margin: 0;
            padding: 120px 20px 80px 20px;
            background-color: #1a1a1a;
            background-image: radial-gradient(#333 1px, transparent 1px);
            background-size: 40px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
            text-align: center;
        }
        h1 {
            font-size: clamp(40px, 8vw, 100px);
            margin: 20px 0;
            text-transform: uppercase;
            text-shadow: 6px 6px 0px #c5ffea;
            -webkit-text-stroke: 1.5px #c5ffea;
            color: transparent;
            letter-spacing: 2px;
            line-height: 1;
        }
        .introduction {
            margin-top: 20px;
            background: #252525;
            padding: 40px;
            border-radius: 20px;
            border: 3px dashed #444;
            max-width: 600px;
        }
        .auth-btn {
            font-family: 'Lilita One', sans-serif;
            background: #c5ffea;
            color: #1a1a1a;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.5rem;
            transition: all 0.2s ease;
            box-shadow: 4px 4px 0px #333;
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
        }
        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 6px 6px 0px #333;
            background: #ffffff;
        }
        input[type="file"] {
            display: none;
        }
        .custom-file-upload {
            border: 2px solid #c5ffea;
            display: inline-block;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 10px;
            margin-bottom: 20px;
            color: #c5ffea;
            transition: 0.3s;
        }
        .custom-file-upload:hover {
            background: rgba(197, 255, 234, 0.1);
        }
        #downloadLink {
            display: none;
            margin-top: 20px;
            font-size: 1.8rem;
            color: #ffffff;
            background: #c5ffea;
            color: #1a1a1a;
            padding: 10px 20px;
            border-radius: 50px;
            transform: rotate(-1deg);
            text-decoration: none;
        }
        .reveal {
            opacity: 0;
            transform: translateY(40px) scale(0.9);
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .reveal.active {
            opacity: 1;
            transform: translateY(0) scale(1);
        }
        .ender {
            font-size: 1.1rem;
            color: #666;
            margin-top: 100px;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <h1 class="reveal">Blender File Restorer</h1>

    <div class="introduction reveal">
        <p style="font-size: 1.4rem; color: #e2e2e2;"><span style="color:#c5ffea">.blend1</span> can be tricky to work with, but I'm here to help! Just upload your file and I'll fix the extension for you.</p>
        
        <label for="fileInput" class="custom-file-upload">
            Choose Your File (.blend1)
        </label>
        <input type="file" id="fileInput" accept=".blend1">

        <div id="resultContainer">
            <a id="downloadLink" href="#">Download File →</a>
        </div>
    </div>

    <a href="https://owenlee.xyz" class="auth-btn reveal">BACK TO HOME</a>

    <p class="ender reveal">© 2026 OwenLee.XYZ</p>

    <script>
        const fileInput = document.getElementById('fileInput');
        const downloadLink = document.getElementById('downloadLink');

        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            let newName = file.name.replace(/\.blend1$/i, '.blend');
            if (newName === file.name) {
                newName = file.name + ".blend";
            }

            const blob = new Blob([file], { type: "application/x-blender" });
            const url = URL.createObjectURL(blob);
            
            downloadLink.href = url;
            downloadLink.download = newName;
            downloadLink.style.display = 'inline-block';
            downloadLink.click();
        });

        const observer = new IntersectionObserver((entries) => {
            entries.forEach((entry) => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.reveal').forEach((el) => observer.observe(el));
    </script>
</body>
</html>
