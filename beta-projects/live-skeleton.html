<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OwenLee.XYZ | Live Skeleton</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.11.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>

    <style>
        body {
            font-family: 'Lilita One', sans-serif;
            margin: 0;
            padding: 100px 20px 80px 20px;
            background-color: #1a1a1a;
            background-image: radial-gradient(#333 1px, transparent 1px);
            background-size: 40px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
            text-align: center;
        }

        .nav-bar {
            position: fixed;
            top: 0;
            right: 0;
            padding: 20px;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .auth-btn {
            font-family: 'Lilita One', sans-serif;
            background: #c5ffea;
            color: #1a1a1a;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.1rem;
            transition: all 0.2s ease;
            box-shadow: 4px 4px 0px #333;
        }

        .auth-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 6px 6px 0px #333;
            background: #ffffff;
        }

        .auth-btn:disabled {
            background: #444;
            color: #888;
            cursor: not-allowed;
            box-shadow: none;
        }

        .user-info {
            display: none;
            align-items: center;
            gap: 10px;
            background: rgba(0,0,0,0.5);
            padding: 5px 15px;
            border-radius: 50px;
            border: 1px solid #c5ffea;
        }

        .user-info img {
            width: 30px;
            height: 30px;
            border-radius: 50%;
        }

        h1 {
            font-size: clamp(30px, 6vw, 80px);
            margin: 10px 0;
            text-transform: uppercase;
            text-shadow: 4px 4px 0px #c5ffea;
            -webkit-text-stroke: 1.5px #c5ffea;
            color: transparent;
            letter-spacing: 2px;
        }

        #canvasContainer {
            position: relative;
            width: 90vw;
            max-width: 800px;
            aspect-ratio: 16/9;
            border: 4px solid #c5ffea;
            border-radius: 20px;
            margin-top: 20px;
            overflow: hidden;
            box-shadow: 10px 10px 0px #333;
            background: #000;
        }

        video, canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #loadingOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(26, 26, 26, 0.9);
            color: #c5ffea;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
            z-index: 999;
            flex-direction: column;
        }

        .controls {
            margin-top: 30px;
        }

        .ender {
            font-size: 1.1rem;
            color: #666;
            margin-top: 50px;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="nav-bar">
        <button id="loginBtn" class="auth-btn">LOGIN / SIGN UP</button>
        <div id="userInfo" class="user-info">
            <img id="userPic" src="" alt="User">
            <span id="userName" style="color: #c5ffea;"></span>
            <button id="logoutBtn" class="auth-btn" style="padding: 5px 10px; font-size: 0.8rem;">LOGOUT</button>
        </div>
    </div>

    <h5 style="font-size: 1rem; color: #666; margin-bottom: 0;">AI EXPERIMENT v1.0.8</h5>
    <h1>Live Skeleton</h1>

    <div id="canvasContainer">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas"></canvas>
        <div id="loadingOverlay">
            <span>INITIALIZING MODELS...</span>
        </div>
    </div>

    <div class="controls">
        <button id="startStopBtn" class="auth-btn" style="font-size: 1.5rem; padding: 15px 40px;" disabled>
            LOADING AI...
        </button>
    </div>

    <p class="ender">© 2026 OwenLee.XYZ | Powered by TensorFlow.js</p>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB4ajU8m2BwQuURWAEg77KWECpa1i7VM6c",
            authDomain: "owenleexyz-api.firebaseapp.com",
            projectId: "owenleexyz-api",
            storageBucket: "owenleexyz-api.firebasestorage.app",
            messagingSenderId: "616093813686",
            appId: "1:616093813686:web:b244e945a87143c09ccf17"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const loginBtn = document.getElementById('loginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const userInfo = document.getElementById('userInfo');
        const userName = document.getElementById('userName');
        const userPic = document.getElementById('userPic');

        loginBtn.onclick = () => signInWithPopup(auth, provider);
        logoutBtn.onclick = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                loginBtn.style.display = 'none';
                userInfo.style.display = 'flex';
                userName.innerText = user.displayName.split(' ')[0];
                userPic.src = user.photoURL;
            } else {
                loginBtn.style.display = 'block';
                userInfo.style.display = 'none';
            }
        });
    </script>

    <script>
        const video = document.getElementById("video");
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        const startStopBtn = document.getElementById("startStopBtn");
        const loadingOverlay = document.getElementById("loadingOverlay");

        let detector;
        let isStreaming = false;
        let stream;
        let prevPose = null;

        async function initAI() {
            await tf.ready();
            detector = await poseDetection.createDetector(
                poseDetection.SupportedModels.MoveNet, 
                { modelType: poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING }
            );
            loadingOverlay.style.display = 'none';
            startStopBtn.disabled = false;
            startStopBtn.innerText = "START CAMERA";
        }

        function drawConnections(poseMap) {
            const bodyPairs = [
                ['left_shoulder','right_shoulder'],['left_shoulder','left_elbow'],['left_elbow','left_wrist'],
                ['right_shoulder','right_elbow'],['right_elbow','right_wrist'],
                ['left_hip','right_hip'],['left_shoulder','left_hip'],['right_shoulder','right_hip'],
                ['left_hip','left_knee'],['left_knee','left_ankle'],['right_hip','right_knee'],['right_knee','right_ankle']
            ];

            ctx.lineWidth = 5;
            ctx.strokeStyle = '#c5ffea'; // Owen's signature mint
            ctx.lineCap = 'round';

            bodyPairs.forEach(([a, b]) => {
                const p1 = poseMap[a];
                const p2 = poseMap[b];
                if (p1 && p2 && p1.score > 0.3 && p2.score > 0.3) {
                    ctx.beginPath();
                    ctx.moveTo(p1.x, p1.y);
                    ctx.lineTo(p2.x, p2.y);
                    ctx.stroke();
                }
            });
        }

        async function render() {
            if (!isStreaming) return;
            
            const poses = await detector.estimatePoses(video);
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (poses.length > 0) {
                let poseMap = {};
                poses[0].keypoints.forEach((k, i) => {
                    // Simple smoothing
                    if (prevPose && prevPose[i]) {
                        k.x = prevPose[i].x * 0.4 + k.x * 0.6;
                        k.y = prevPose[i].y * 0.4 + k.y * 0.6;
                    }
                    poseMap[k.name] = k;
                });
                prevPose = poses[0].keypoints;

                drawConnections(poseMap);
                
                // Draw dots
                poses[0].keypoints.forEach(p => {
                    if (p.score > 0.3) {
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, 6, 0, Math.PI * 2);
                        ctx.fillStyle = '#ffffff';
                        ctx.fill();
                        ctx.strokeStyle = '#c5ffea';
                        ctx.stroke();
                    }
                });
            }
            requestAnimationFrame(render);
        }

        startStopBtn.onclick = async () => {
            if (isStreaming) {
                stream.getTracks().forEach(t => t.stop());
                isStreaming = false;
                startStopBtn.innerText = "START CAMERA";
            } else {
                try {
                    stream = await navigator.mediaDevices.getUserMedia({ video: true });
                    video.srcObject = stream;
                    video.onloadedmetadata = () => {
                        canvas.width = video.videoWidth;
                        canvas.height = video.videoHeight;
                    };
                    isStreaming = true;
                    render();
                    startStopBtn.innerText = "STOP CAMERA";
                } catch (err) {
                    alert("Camera blocked!");
                }
            }
        };

        initAI();
    </script>
</body>
</html>
